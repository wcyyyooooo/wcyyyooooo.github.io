<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wcyyyooooo</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f4f5f7;
    color: #4a555e;
    line-height: 1.85;
    letter-spacing: 0.01em;
  }

  .header {
    max-width: 640px;
    margin: 0 auto;
    padding: 6rem 1.5rem 3rem;
    text-align: center;
  }

  h1 {
    font-size: 1.15rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: #6b7b8d;
    margin-bottom: 0.5rem;
  }

  .subtitle {
    font-size: 0.8rem;
    color: #b0bac5;
    letter-spacing: 0.06em;
    margin-bottom: 1.2rem;
  }

  .header-links {
    display: flex;
    justify-content: center;
    gap: 1.6rem;
    flex-wrap: wrap;
  }

  .header-links a {
    color: #b0bac5;
    text-decoration: none;
    font-size: 0.8rem;
    letter-spacing: 0.04em;
    transition: color 0.3s;
  }

  .header-links a:hover {
    color: #6b7b8d;
  }

  .tag-bar {
    max-width: 640px;
    margin: 0 auto;
    padding: 0 1.5rem 1.5rem;
    display: flex;
    justify-content: center;
    gap: 0.6rem;
    flex-wrap: wrap;
  }

  .tag-btn {
    font-size: 0.75rem;
    color: #b0bac5;
    background: transparent;
    border: 1px solid #dce3ea;
    border-radius: 2px;
    padding: 2px 12px;
    cursor: pointer;
    transition: all 0.3s;
    font-family: inherit;
    letter-spacing: 0.04em;
  }

  .tag-btn:hover {
    color: #7b8fa1;
    border-color: #c5ced8;
  }

  .tag-btn.active {
    color: #5a6c7d;
    background: #e8ecf1;
    border-color: #e8ecf1;
  }

  .tag-count {
    padding-left: 2px;
    color: #d0d7e0;
    font-size: 0.72rem;
  }

  .tag-btn.active .tag-count {
    color: #a0aebd;
  }

  .timeline {
    max-width: 640px;
    margin: 0 auto;
    padding: 0 1.5rem 5rem;
    position: relative;
  }

  .timeline::before {
    content: "";
    position: absolute;
    left: 2rem;
    top: 0;
    bottom: 0;
    width: 1px;
    background: #dce3ea;
  }

  .entry {
    position: relative;
    padding-left: 3.5rem;
    margin-bottom: 3rem;
  }

  .entry::before {
    content: "";
    position: absolute;
    left: 1.8rem;
    top: 0.5rem;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    border: 1px solid #c5ced8;
    background: #f4f5f7;
  }

  .entry-date {
    font-size: 0.75rem;
    color: #c0c9d4;
    margin-bottom: 0.4rem;
    letter-spacing: 0.03em;
  }

  .entry-title {
    font-size: 1rem;
    font-weight: 400;
    margin-bottom: 0.35rem;
  }

  .entry-title a {
    color: #5a6c7d;
    text-decoration: none;
    transition: color 0.3s;
  }

  .entry-title a:hover {
    color: #3d4f60;
  }

  .entry-body {
    font-size: 0.85rem;
    color: #8e9aab;
    line-height: 1.75;
  }

  .entry-body p {
    margin-bottom: 0.5rem;
  }

  .entry-body p:last-child {
    margin-bottom: 0;
  }

  .entry-tags {
    margin-top: 0.6rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .entry-tags span {
    font-size: 0.7rem;
    color: #bcc5d0;
    background: #eef1f5;
    padding: 1px 8px;
    border-radius: 2px;
    cursor: pointer;
    transition: color 0.3s, background 0.3s;
    letter-spacing: 0.03em;
  }

  .entry-tags span:hover {
    color: #7b8fa1;
    background: #e2e7ee;
  }

  .year-divider {
    padding-left: 1.5rem;
    margin-bottom: 1.8rem;
    font-size: 0.8rem;
    color: #d0d7e0;
    font-weight: 400;
    letter-spacing: 0.06em;
  }

  @media (max-width: 480px) {
    .header {
      padding-top: 3.5rem;
    }
    .timeline::before {
      left: 1.25rem;
    }
    .entry {
      padding-left: 2.5rem;
    }
    .entry::before {
      left: 1.05rem;
    }
    .year-divider {
      padding-left: 0.75rem;
    }
    .tag-bar {
      padding-left: 1rem;
      padding-right: 1rem;
    }
  }

  .player {
    position: fixed;
    right: 1.5rem;
    bottom: 1.5rem;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .player-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid #c5ced8;
    background: #f4f5f7;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.3s, background 0.3s;
    padding: 0;
    outline: none;
  }

  .player-btn:hover {
    border-color: #8e9aab;
    background: #eef1f5;
  }

  .player-btn svg {
    width: 14px;
    height: 14px;
    fill: #8e9aab;
    transition: fill 0.3s;
  }

  .player-btn:hover svg {
    fill: #6b7b8d;
  }

  .player-btn.playing {
    border-color: #7b8fa1;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(123, 143, 161, 0.15); }
    50% { box-shadow: 0 0 0 6px rgba(123, 143, 161, 0); }
  }

  .player-info {
    font-size: 0.7rem;
    color: #b0bac5;
    letter-spacing: 0.04em;
    opacity: 0;
    transition: opacity 0.5s;
    white-space: nowrap;
  }

  .player:hover .player-info,
  .player-btn.playing ~ .player-info {
    opacity: 1;
  }
</style>
</head>
<body>
  <div class="header">
    <h1>wcyyyooooo</h1>
    <p class="subtitle">安静地写一些东西</p>
    <div class="header-links">
      <a href="https://github.com/wcyyyooooo">GitHub</a>
      <a href="mailto:2812001079@qq.com">Mail</a>
    </div>
  </div>

  <div class="tag-bar" id="tagBar"></div>
  <div class="timeline" id="timeline"></div>

  <div class="player" id="player">
    <button class="player-btn" id="playerBtn" title="播放">
      <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>
    <span class="player-info" id="playerInfo"></span>
    <audio id="audio" loop>
      <source src="music.mp3" type="audio/mpeg">
    </audio>
  </div>

  <script>
    function renderMarkdown(text) {
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
        .split('\n\n').map(p => `<p>${p.trim()}</p>`).join('');
    }

    function parseFrontmatter(text) {
      const match = text.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
      if (!match) return { meta: {}, body: text };
      const meta = {};
      match[1].split('\n').forEach(line => {
        const [key, ...rest] = line.split(':');
        if (key && rest.length) {
          let val = rest.join(':').trim();
          if (val.startsWith('[') && val.endsWith(']')) {
            val = val.slice(1, -1).split(',').map(s => s.trim()).filter(Boolean);
          }
          meta[key.trim()] = val;
        }
      });
      return { meta, body: match[2].trim() };
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return `${d.getFullYear()} 年 ${d.getMonth() + 1} 月 ${d.getDate()} 日`;
    }

    function yearFromDate(dateStr) {
      return new Date(dateStr).getFullYear().toString();
    }

    let allPosts = [];
    let activeTag = null;

    function buildTagBar() {
      const counts = {};
      allPosts.forEach(p => {
        (p.tags || []).forEach(t => {
          counts[t] = (counts[t] || 0) + 1;
        });
      });

      const bar = document.getElementById('tagBar');
      bar.innerHTML = '';

      const allBtn = document.createElement('button');
      allBtn.className = 'tag-btn' + (activeTag === null ? ' active' : '');
      allBtn.textContent = '全部';
      allBtn.addEventListener('click', () => filterBy(null));
      bar.appendChild(allBtn);

      Object.entries(counts).forEach(([tag, count]) => {
        const btn = document.createElement('button');
        btn.className = 'tag-btn' + (activeTag === tag ? ' active' : '');
        btn.innerHTML = `${tag}<span class="tag-count">${count}</span>`;
        btn.addEventListener('click', () => filterBy(activeTag === tag ? null : tag));
        bar.appendChild(btn);
      });
    }

    function filterBy(tag) {
      activeTag = tag;
      buildTagBar();
      renderTimeline(tag ? allPosts.filter(p => (p.tags || []).includes(tag)) : allPosts);
    }

    function renderTimeline(posts) {
      const timeline = document.getElementById('timeline');
      timeline.innerHTML = '';

      if (!posts.length) {
        timeline.innerHTML = '<p style="color:#c0c9d4;text-align:center;padding:2rem;font-size:0.8rem;">没有匹配的文章</p>';
        return;
      }

      let lastYear = '';

      posts.forEach(post => {
        const year = yearFromDate(post.date);

        if (year !== lastYear) {
          const div = document.createElement('div');
          div.className = 'year-divider';
          div.textContent = year;
          timeline.appendChild(div);
          lastYear = year;
        }

        const entry = document.createElement('div');
        entry.className = 'entry';

        const tagsHtml = post.tags && post.tags.length
          ? `<div class="entry-tags">${post.tags.map(t => `<span class="tag-link" data-tag="${t}">${t}</span>`).join('')}</div>`
          : '';

        entry.innerHTML = `
          <div class="entry-date">${formatDate(post.date)}</div>
          <div class="entry-title"><a href="post.html?p=${post.file}">${post.title}</a></div>
          <div class="entry-body">${renderMarkdown(post.body)}</div>
          ${tagsHtml}
        `;

        entry.querySelectorAll('.tag-link').forEach(el => {
          el.addEventListener('click', () => filterBy(el.dataset.tag));
        });

        timeline.appendChild(entry);
      });
    }

    async function loadPosts() {
      const timeline = document.getElementById('timeline');

      let files;
      try {
        const res = await fetch('posts/index.json');
        if (!res.ok) throw new Error('Failed to load post list');
        files = await res.json();
      } catch (e) {
        timeline.innerHTML = '<p style="color:#b0bac5;text-align:center;padding:2rem;">加载失败，请稍后刷新。</p>';
        return;
      }

      for (const file of files) {
        try {
          const r = await fetch(`posts/${file}`);
          if (!r.ok) throw new Error(`Failed to load ${file}`);
          const text = await r.text();
          const { meta, body } = parseFrontmatter(text);
          if (!meta.date || !meta.title) continue;
          allPosts.push({ ...meta, body, file });
        } catch (e) {
          continue;
        }
      }

      if (!allPosts.length) {
        timeline.innerHTML = '<p style="color:#b0bac5;text-align:center;padding:2rem;">暂无文章。</p>';
        return;
      }

      buildTagBar();
      renderTimeline(allPosts);
    }

    loadPosts();

    const audio = document.getElementById('audio');
    const btn = document.getElementById('playerBtn');
    const playIcon = document.getElementById('playIcon');
    const pauseIcon = document.getElementById('pauseIcon');
    const info = document.getElementById('playerInfo');

    btn.addEventListener('click', () => {
      if (audio.paused) {
        audio.play().catch(() => {});
        btn.classList.add('playing');
        playIcon.style.display = 'none';
        pauseIcon.style.display = '';
        info.textContent = '正在播放';
      } else {
        audio.pause();
        btn.classList.remove('playing');
        playIcon.style.display = '';
        pauseIcon.style.display = 'none';
        info.textContent = '';
      }
    });

    audio.addEventListener('ended', () => {
      btn.classList.remove('playing');
      playIcon.style.display = '';
      pauseIcon.style.display = 'none';
      info.textContent = '';
    });
  </script>
</body>
</html>
