<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wcyyyooooo</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #fafafa;
    color: #333;
    line-height: 1.8;
  }

  .header {
    max-width: 640px;
    margin: 0 auto;
    padding: 4rem 1.5rem 2rem;
    text-align: center;
  }

  .avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #e8e8e8;
    margin: 0 auto 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    color: #999;
  }

  h1 {
    font-size: 1.3rem;
    font-weight: 500;
    margin-bottom: 0.15rem;
  }

  .subtitle {
    font-size: 0.85rem;
    color: #999;
    margin-bottom: 0.5rem;
  }

  .header-links {
    display: flex;
    justify-content: center;
    gap: 1.2rem;
    flex-wrap: wrap;
  }

  .header-links a {
    color: #999;
    text-decoration: none;
    font-size: 0.85rem;
    transition: color 0.2s;
  }

  .header-links a:hover {
    color: #333;
  }

  .tag-bar {
    max-width: 640px;
    margin: 0 auto;
    padding: 0 1.5rem 1.5rem;
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .tag-btn {
    font-size: 0.8rem;
    color: #999;
    background: transparent;
    border: 1px solid #e0e0e0;
    border-radius: 14px;
    padding: 2px 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }

  .tag-btn:hover {
    color: #555;
    border-color: #bbb;
  }

  .tag-btn.active {
    color: #333;
    background: #e8e8e8;
    border-color: #e8e8e8;
  }

  .tag-count {
    padding-left: 2px;
    color: #ccc;
    font-size: 0.75rem;
  }

  .tag-btn.active .tag-count {
    color: #999;
  }

  .timeline {
    max-width: 640px;
    margin: 0 auto;
    padding: 0 1.5rem 4rem;
    position: relative;
  }

  .timeline::before {
    content: "";
    position: absolute;
    left: 2rem;
    top: 0;
    bottom: 0;
    width: 1px;
    background: #e0e0e0;
  }

  .entry {
    position: relative;
    padding-left: 3.5rem;
    margin-bottom: 2.5rem;
  }

  .entry::before {
    content: "";
    position: absolute;
    left: 1.85rem;
    top: 0.55rem;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ccc;
  }

  .entry-date {
    font-size: 0.8rem;
    color: #bbb;
    margin-bottom: 0.35rem;
  }

  .entry-title {
    font-size: 1.05rem;
    font-weight: 500;
    margin-bottom: 0.3rem;
    color: #333;
  }

  .entry-title a {
    color: inherit;
    text-decoration: none;
  }

  .entry-title a:hover {
    text-decoration: underline;
  }

  .entry-body {
    font-size: 0.9rem;
    color: #666;
  }

  .entry-body p {
    margin-bottom: 0.6rem;
  }

  .entry-body p:last-child {
    margin-bottom: 0;
  }

  .entry-tags {
    margin-top: 0.5rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .entry-tags span {
    font-size: 0.75rem;
    color: #aaa;
    background: #f0f0f0;
    padding: 1px 8px;
    border-radius: 3px;
    cursor: pointer;
    transition: color 0.15s, background 0.15s;
  }

  .entry-tags span:hover {
    color: #555;
    background: #e0e0e0;
  }

  .year-divider {
    padding-left: 1.5rem;
    margin-bottom: 1.5rem;
    font-size: 0.85rem;
    color: #ccc;
    font-weight: 500;
  }

  @media (max-width: 480px) {
    .header {
      padding-top: 2.5rem;
    }
    .timeline::before {
      left: 1.25rem;
    }
    .entry {
      padding-left: 2.5rem;
    }
    .entry::before {
      left: 1.1rem;
    }
    .year-divider {
      padding-left: 0.75rem;
    }
    .tag-bar {
      padding-left: 1rem;
      padding-right: 1rem;
    }
  }
</style>
</head>
<body>
  <div class="header">
    <div class="avatar">W</div>
    <h1>wcyyyooooo</h1>
    <p class="subtitle">写点东西，记录生活</p>
    <div class="header-links">
      <a href="https://github.com/wcyyyooooo">GitHub</a>
      <a href="mailto:2812001079@qq.com">Email</a>
      <a href="#">RSS</a>
    </div>
  </div>

  <div class="tag-bar" id="tagBar"></div>
  <div class="timeline" id="timeline"></div>

  <script>
    function renderMarkdown(text) {
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
        .split('\n\n').map(p => `<p>${p.trim()}</p>`).join('');
    }

    function parseFrontmatter(text) {
      const match = text.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
      if (!match) return { meta: {}, body: text };
      const meta = {};
      match[1].split('\n').forEach(line => {
        const [key, ...rest] = line.split(':');
        if (key && rest.length) {
          let val = rest.join(':').trim();
          if (val.startsWith('[') && val.endsWith(']')) {
            val = val.slice(1, -1).split(',').map(s => s.trim()).filter(Boolean);
          }
          meta[key.trim()] = val;
        }
      });
      return { meta, body: match[2].trim() };
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return `${d.getFullYear()} 年 ${d.getMonth() + 1} 月 ${d.getDate()} 日`;
    }

    function yearFromDate(dateStr) {
      return new Date(dateStr).getFullYear().toString();
    }

    let allPosts = [];
    let activeTag = null;

    function buildTagBar() {
      const counts = {};
      allPosts.forEach(p => {
        (p.tags || []).forEach(t => {
          counts[t] = (counts[t] || 0) + 1;
        });
      });

      const bar = document.getElementById('tagBar');
      bar.innerHTML = '';

      const allBtn = document.createElement('button');
      allBtn.className = 'tag-btn' + (activeTag === null ? ' active' : '');
      allBtn.textContent = '全部';
      allBtn.addEventListener('click', () => filterBy(null));
      bar.appendChild(allBtn);

      Object.entries(counts).forEach(([tag, count]) => {
        const btn = document.createElement('button');
        btn.className = 'tag-btn' + (activeTag === tag ? ' active' : '');
        btn.innerHTML = `${tag}<span class="tag-count">${count}</span>`;
        btn.addEventListener('click', () => filterBy(activeTag === tag ? null : tag));
        bar.appendChild(btn);
      });
    }

    function filterBy(tag) {
      activeTag = tag;
      buildTagBar();
      renderTimeline(tag ? allPosts.filter(p => (p.tags || []).includes(tag)) : allPosts);
    }

    function renderTimeline(posts) {
      const timeline = document.getElementById('timeline');
      timeline.innerHTML = '';

      if (!posts.length) {
        timeline.innerHTML = '<p style="color:#ccc;text-align:center;padding:2rem;font-size:0.85rem;">没有匹配的文章</p>';
        return;
      }

      let lastYear = '';

      posts.forEach(post => {
        const year = yearFromDate(post.date);

        if (year !== lastYear) {
          const div = document.createElement('div');
          div.className = 'year-divider';
          div.textContent = year;
          timeline.appendChild(div);
          lastYear = year;
        }

        const entry = document.createElement('div');
        entry.className = 'entry';

        const tagsHtml = post.tags && post.tags.length
          ? `<div class="entry-tags">${post.tags.map(t => `<span class="tag-link" data-tag="${t}">${t}</span>`).join('')}</div>`
          : '';

        entry.innerHTML = `
          <div class="entry-date">${formatDate(post.date)}</div>
          <div class="entry-title"><a href="post.html?p=${post.file}">${post.title}</a></div>
          <div class="entry-body">${renderMarkdown(post.body)}</div>
          ${tagsHtml}
        `;

        entry.querySelectorAll('.tag-link').forEach(el => {
          el.addEventListener('click', () => filterBy(el.dataset.tag));
        });

        timeline.appendChild(entry);
      });
    }

    async function loadPosts() {
      const timeline = document.getElementById('timeline');

      let files;
      try {
        const res = await fetch('posts/index.json');
        if (!res.ok) throw new Error('Failed to load post list');
        files = await res.json();
      } catch (e) {
        timeline.innerHTML = '<p style="color:#999;text-align:center;padding:2rem;">加载失败，请稍后刷新。</p>';
        return;
      }

      for (const file of files) {
        try {
          const r = await fetch(`posts/${file}`);
          if (!r.ok) throw new Error(`Failed to load ${file}`);
          const text = await r.text();
          const { meta, body } = parseFrontmatter(text);
          if (!meta.date || !meta.title) continue;
          allPosts.push({ ...meta, body, file });
        } catch (e) {
          continue;
        }
      }

      if (!allPosts.length) {
        timeline.innerHTML = '<p style="color:#999;text-align:center;padding:2rem;">暂无文章。</p>';
        return;
      }

      buildTagBar();
      renderTimeline(allPosts);
    }

    loadPosts();
  </script>
</body>
</html>
