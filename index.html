<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wcyyyooooo</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #fafafa;
    color: #333;
    line-height: 1.8;
  }

  .header {
    max-width: 640px;
    margin: 0 auto;
    padding: 4rem 1.5rem 2rem;
    text-align: center;
  }

  .avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #e8e8e8;
    margin: 0 auto 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    color: #999;
  }

  h1 {
    font-size: 1.3rem;
    font-weight: 500;
    margin-bottom: 0.15rem;
  }

  .subtitle {
    font-size: 0.85rem;
    color: #999;
    margin-bottom: 0.5rem;
  }

  .header-links {
    display: flex;
    justify-content: center;
    gap: 1.2rem;
    flex-wrap: wrap;
  }

  .header-links a {
    color: #999;
    text-decoration: none;
    font-size: 0.85rem;
    transition: color 0.2s;
  }

  .header-links a:hover {
    color: #333;
  }

  .timeline {
    max-width: 640px;
    margin: 0 auto;
    padding: 0 1.5rem 4rem;
    position: relative;
  }

  .timeline::before {
    content: "";
    position: absolute;
    left: 2rem;
    top: 0;
    bottom: 0;
    width: 1px;
    background: #e0e0e0;
  }

  .entry {
    position: relative;
    padding-left: 3.5rem;
    margin-bottom: 2.5rem;
  }

  .entry::before {
    content: "";
    position: absolute;
    left: 1.85rem;
    top: 0.55rem;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ccc;
  }

  .entry-date {
    font-size: 0.8rem;
    color: #bbb;
    margin-bottom: 0.35rem;
  }

  .entry-title {
    font-size: 1.05rem;
    font-weight: 500;
    margin-bottom: 0.3rem;
    color: #333;
  }

  .entry-title a {
    color: inherit;
    text-decoration: none;
  }

  .entry-title a:hover {
    text-decoration: underline;
  }

  .entry-body {
    font-size: 0.9rem;
    color: #666;
  }

  .entry-body p {
    margin-bottom: 0.6rem;
  }

  .entry-body p:last-child {
    margin-bottom: 0;
  }

  .entry-tags {
    margin-top: 0.5rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .entry-tags span {
    font-size: 0.75rem;
    color: #aaa;
    background: #f0f0f0;
    padding: 1px 8px;
    border-radius: 3px;
  }

  .year-divider {
    padding-left: 1.5rem;
    margin-bottom: 1.5rem;
    font-size: 0.85rem;
    color: #ccc;
    font-weight: 500;
  }

  @media (max-width: 480px) {
    .header {
      padding-top: 2.5rem;
    }
    .timeline::before {
      left: 1.25rem;
    }
    .entry {
      padding-left: 2.5rem;
    }
    .entry::before {
      left: 1.1rem;
    }
    .year-divider {
      padding-left: 0.75rem;
    }
  }
</style>
</head>
<body>
  <div class="header">
    <div class="avatar">W</div>
    <h1>wcyyyooooo</h1>
    <p class="subtitle">写点东西，记录生活</p>
    <div class="header-links">
      <a href="https://github.com/wcyyyooooo">GitHub</a>
      <a href="mailto:2812001079@qq.com">Email</a>
      <a href="#">RSS</a>
    </div>
  </div>

  <div class="timeline" id="timeline"></div>

  <script>
    function parseFrontmatter(text) {
      const match = text.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
      if (!match) return { meta: {}, body: text };
      const meta = {};
      match[1].split('\n').forEach(line => {
        const [key, ...rest] = line.split(':');
        if (key && rest.length) {
          let val = rest.join(':').trim();
          if (val.startsWith('[') && val.endsWith(']')) {
            val = val.slice(1, -1).split(',').map(s => s.trim()).filter(Boolean);
          }
          meta[key.trim()] = val;
        }
      });
      return { meta, body: match[2].trim() };
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return `${d.getFullYear()} 年 ${d.getMonth() + 1} 月 ${d.getDate()} 日`;
    }

    function yearFromDate(dateStr) {
      return new Date(dateStr).getFullYear().toString();
    }

    async function loadPosts() {
      const res = await fetch('posts/index.json');
      const files = await res.json();

      const posts = [];
      for (const file of files) {
        const r = await fetch(`posts/${file}`);
        const text = await r.text();
        const { meta, body } = parseFrontmatter(text);
        posts.push({ ...meta, body, file });
      }

      const timeline = document.getElementById('timeline');
      let lastYear = '';

      posts.forEach(post => {
        const year = yearFromDate(post.date);

        if (year !== lastYear) {
          const div = document.createElement('div');
          div.className = 'year-divider';
          div.textContent = year;
          timeline.appendChild(div);
          lastYear = year;
        }

        const entry = document.createElement('div');
        entry.className = 'entry';

        entry.innerHTML = `
          <div class="entry-date">${formatDate(post.date)}</div>
          <div class="entry-title"><a href="#">${post.title}</a></div>
          <div class="entry-body">${marked.parse(post.body)}</div>
          ${post.tags && post.tags.length ? `<div class="entry-tags">${post.tags.map(t => `<span>${t}</span>`).join('')}</div>` : ''}
        `;

        timeline.appendChild(entry);
      });
    }

    loadPosts();
  </script>
</body>
</html>
