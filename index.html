<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人主页</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #fafafa;
    color: #333;
    line-height: 1.6;
  }

  .container {
    text-align: center;
    padding: 2rem;
    max-width: 480px;
  }

  .avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #e0e0e0;
    margin: 0 auto 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    color: #999;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    margin-bottom: 0.25rem;
  }

  .subtitle {
    font-size: 0.9rem;
    color: #888;
    margin-bottom: 1.5rem;
  }

  .bio {
    font-size: 0.95rem;
    color: #666;
    margin-bottom: 2rem;
  }

  .links {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  .links a {
    color: #555;
    text-decoration: none;
    font-size: 0.9rem;
    border-bottom: 1px solid #ddd;
    padding-bottom: 2px;
    transition: color 0.2s, border-color 0.2s;
  }

  .links a:hover {
    color: #000;
    border-color: #999;
  }

  .footer {
    margin-top: 3rem;
    font-size: 0.8rem;
    color: #bbb;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="avatar">W</div>
    <h1>你的名字</h1>
    <p class="subtitle">开发者 / 设计师 / 写作者</p>
    <p class="bio">
      在这里写一段简短的自我介绍。你喜欢做什么，在做什么，或者什么都不写，保持空白也很好。
    </p>
    <div class="links">
      <a href="https://github.com">GitHub</a>
      <a href="mailto:hello@example.com">Email</a>
      <a href="#">Blog</a>
      <a href="#">Twitter</a>
    </div>
    <p class="footer">&copy; 2026</p>
  </div>
</body>
</html>
