<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f4f5f7;
    color: #4a555e;
    line-height: 1.9;
    letter-spacing: 0.01em;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 3.5rem 1.5rem 5rem;
  }

  .back {
    display: inline-block;
    font-size: 0.78rem;
    color: #b0bac5;
    text-decoration: none;
    margin-bottom: 2.5rem;
    letter-spacing: 0.04em;
    transition: color 0.3s;
  }

  .back:hover { color: #6b7b8d; }

  .post-date {
    font-size: 0.78rem;
    color: #c0c9d4;
    margin-bottom: 0.6rem;
    letter-spacing: 0.04em;
  }

  .post-title {
    font-size: 1.35rem;
    font-weight: 400;
    margin-bottom: 2rem;
    line-height: 1.5;
    color: #5a6c7d;
    letter-spacing: 0.03em;
  }

  .post-body {
    font-size: 0.9rem;
    color: #6b7b8d;
  }

  .post-body p {
    margin-bottom: 1rem;
  }

  .post-body code {
    background: #e8ecf1;
    padding: 1px 6px;
    border-radius: 2px;
    font-size: 0.88em;
    color: #7b8fa1;
  }

  .post-body pre {
    background: #eef1f5;
    padding: 1rem 1.2rem;
    border-radius: 2px;
    overflow-x: auto;
    margin-bottom: 1rem;
    font-size: 0.85em;
    line-height: 1.65;
    color: #6b7b8d;
  }

  .post-body pre code {
    background: none;
    padding: 0;
    color: inherit;
  }

  .post-body a {
    color: #7b8fa1;
    text-decoration: underline;
  }

  .post-body h2 {
    font-size: 1.05rem;
    font-weight: 400;
    margin: 2.2rem 0 0.8rem;
    color: #5a6c7d;
    letter-spacing: 0.04em;
  }

  .post-body blockquote {
    border-left: 1px solid #c5ced8;
    padding-left: 1rem;
    color: #8e9aab;
    margin-bottom: 1rem;
  }

  .post-body strong {
    font-weight: 500;
    color: #5a6c7d;
  }

  .post-tags {
    margin-top: 3rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .post-tags span {
    font-size: 0.7rem;
    color: #bcc5d0;
    background: #eef1f5;
    padding: 1px 8px;
    border-radius: 2px;
    letter-spacing: 0.03em;
  }

  .error {
    text-align: center;
    color: #c0c9d4;
    padding: 5rem 0;
    font-size: 0.85rem;
  }

  @media (max-width: 480px) {
    .container { padding-top: 2rem; }
    .post-title { font-size: 1.15rem; }
  }
</style>
</head>
<body>
  <div class="container" id="container">
    <p class="error">加载中…</p>
  </div>

  <script>
    function renderMarkdown(text) {
      const lines = text.split('\n');
      let html = '';
      let inCode = false;

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        if (line.startsWith('```')) {
          inCode = !inCode;
          html += inCode ? '<pre>' : '</pre>';
          continue;
        }

        if (inCode) {
          html += line.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '\n';
          continue;
        }

        let processed = line
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          .replace(/\*([^*]+)\*/g, '<em>$1</em>')
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');

        if (line.startsWith('## ')) {
          html += `<h2>${processed.slice(3)}</h2>`;
        } else if (line.startsWith('> ')) {
          html += `<blockquote>${processed.slice(2)}</blockquote>`;
        } else if (line.trim() === '') {
          html += '';
        } else {
          html += `<p>${processed}</p>`;
        }
      }

      return html;
    }

    function parseFrontmatter(text) {
      const match = text.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
      if (!match) return { meta: {}, body: text };
      const meta = {};
      match[1].split('\n').forEach(line => {
        const [key, ...rest] = line.split(':');
        if (key && rest.length) {
          let val = rest.join(':').trim();
          if (val.startsWith('[') && val.endsWith(']')) {
            val = val.slice(1, -1).split(',').map(s => s.trim()).filter(Boolean);
          }
          meta[key.trim()] = val;
        }
      });
      return { meta, body: match[2].trim() };
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return `${d.getFullYear()} 年 ${d.getMonth() + 1} 月 ${d.getDate()} 日`;
    }

    async function load() {
      const container = document.getElementById('container');
      const params = new URLSearchParams(window.location.search);
      const file = params.get('p');

      if (!file) {
        container.innerHTML = '<p class="error">未指定文章。</p>';
        return;
      }

      try {
        const r = await fetch(`posts/${file}`);
        if (!r.ok) throw new Error('Not found');
        const text = await r.text();
        const { meta, body } = parseFrontmatter(text);

        document.title = meta.title || '文章';

        const tagsHtml = meta.tags && meta.tags.length
          ? `<div class="post-tags">${meta.tags.map(t => `<span>${t}</span>`).join('')}</div>`
          : '';

        container.innerHTML = `
          <a class="back" href="/">&larr; 返回</a>
          <div class="post-date">${formatDate(meta.date)}</div>
          <h1 class="post-title">${meta.title || ''}</h1>
          <div class="post-body">${renderMarkdown(body)}</div>
          ${tagsHtml}
        `;
      } catch (e) {
        container.innerHTML = '<p class="error">文章加载失败。</p>';
      }
    }

    load();
  </script>
</body>
</html>
