<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歌单</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f4f5f7;
    color: #4a555e;
    line-height: 1.9;
    letter-spacing: 0.01em;
  }

  .container {
    max-width: 520px;
    margin: 0 auto;
    padding: 3.5rem 1.5rem 5rem;
  }

  .back {
    display: inline-block;
    font-size: 0.78rem;
    color: #b0bac5;
    text-decoration: none;
    margin-bottom: 2.5rem;
    letter-spacing: 0.04em;
    transition: color 0.3s;
  }

  .back:hover { color: #6b7b8d; }

  .section-title {
    font-size: 1rem;
    font-weight: 400;
    color: #6b7b8d;
    letter-spacing: 0.06em;
    margin-bottom: 1.2rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid #dce3ea;
  }

  .list {
    list-style: none;
  }

  .list li {
    font-size: 0.85rem;
    color: #6b7b8d;
    padding: 0.3rem 0;
    letter-spacing: 0.03em;
    line-height: 1.7;
  }

  .list li::before {
    content: "— ";
    color: #dce3ea;
  }

  .list li .meta {
    font-size: 0.72rem;
    color: #bcc5d0;
    margin-left: 0.4rem;
  }
</style>
</head>
<body>
  <div class="container">
    <a class="back" href="/">&larr; 返回</a>
    <h2 class="section-title">歌单</h2>
    <ul class="list" id="musicList"><li>加载中…</li></ul>
  </div>

  <script>
    async function load() {
      try {
        const r = await fetch('data/music.json');
        const items = await r.json();

        document.getElementById('musicList').innerHTML = items.length
          ? items.map(i => `<li>${i.title}${i.artist ? '<span class="meta">' + i.artist + '</span>' : ''}</li>`).join('')
          : '<li style="color:#c5ced8;">暂无</li>';
      } catch (e) {
        document.getElementById('musicList').innerHTML = '<li style="color:#c5ced8;">加载失败</li>';
      }
    }

    load();
  </script>
</body>
</html>
